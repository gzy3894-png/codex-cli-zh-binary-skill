name: Build Codex for TUI

on:
  workflow_dispatch:
  push:
    branches:
      - android-arm64-musl-installer
    paths:
      - "android-app/**"
      - "android-arm64-musl/**"
      - "tests/**"
      - ".github/workflows/build-codex-for-tui.yml"

jobs:
  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke test installer scripts
        run: sh tests/codex-for-tui-installer-smoke.sh
        working-directory: .

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            android-app/**/*.gradle*
            android-app/**/gradle-wrapper.properties
            android-app/gradle/libs.versions.toml

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;29.0.13846066"
          yes | sdkmanager --licenses

      - name: Grant Gradle wrapper permission
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: codex-for-tui-debug-apk
          path: android-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
