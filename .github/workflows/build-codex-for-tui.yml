name: Build Codex for TUI

on:
  workflow_dispatch:
    inputs:
      build_release:
        description: "Build release APK artifact"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - android-arm64-musl-installer
    tags:
      - "codex-for-tui-v*"
    paths:
      - "android-app/**"
      - "android-arm64-musl/**"
      - "tests/**"
      - ".github/workflows/build-codex-for-tui.yml"

jobs:
  script-smoke:
    name: Script smoke and static guards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke test installer scripts
        run: sh tests/codex-for-tui-installer-smoke.sh

      - name: Static guard tests
        run: sh tests/codex-for-tui-static-guards.sh

      - name: Device smoke script syntax
        run: sh -n tests/codex-for-tui-device-smoke.sh

  android-debug-build:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: script-smoke
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            android-app/**/*.gradle*
            android-app/**/gradle-wrapper.properties
            android-app/gradle/libs.versions.toml

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;29.0.13846066"
          yes | sdkmanager --licenses

      - name: Grant Gradle wrapper permission
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: codex-for-tui-debug-apk
          path: android-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  android-release-build:
    name: Build release APK
    runs-on: ubuntu-latest
    needs: script-smoke
    if: ${{ startsWith(github.ref, 'refs/tags/codex-for-tui-v') || github.event.inputs.build_release == 'true' }}
    defaults:
      run:
        working-directory: android-app
    env:
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
      ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            android-app/**/*.gradle*
            android-app/**/gradle-wrapper.properties
            android-app/gradle/libs.versions.toml

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;29.0.13846066"
          yes | sdkmanager --licenses

      - name: Prepare release signing if secrets exist
        id: release-signing
        shell: bash
        run: |
          if [ -n "$ANDROID_RELEASE_KEYSTORE_BASE64" ] \
            && [ -n "$ANDROID_RELEASE_KEY_ALIAS" ] \
            && [ -n "$ANDROID_RELEASE_KEY_PASSWORD" ] \
            && [ -n "$ANDROID_RELEASE_STORE_PASSWORD" ]; then
            printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > /tmp/xed.keystore
            {
              printf 'keyAlias=%s\n' "$ANDROID_RELEASE_KEY_ALIAS"
              printf 'keyPassword=%s\n' "$ANDROID_RELEASE_KEY_PASSWORD"
              printf 'storePassword=%s\n' "$ANDROID_RELEASE_STORE_PASSWORD"
            } > /tmp/signing.properties
            echo "artifact_name=codex-for-tui-official-release-apk" >> "$GITHUB_OUTPUT"
          else
            echo "No release signing secrets found; Gradle will use the test key fallback."
            echo "artifact_name=codex-for-tui-unsigned-or-test-signed-release-apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Grant Gradle wrapper permission
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release-signing.outputs.artifact_name }}
          path: android-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
